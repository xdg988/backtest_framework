data:
  token: "cf906b3b49a5f7df15a456bf24e09ebe3e575c0b16728c2331f544a8"  # Replace with your actual token
  cache_dir: "./data_cache"
  cache_expiry_days: 7

backtest:
  default_cash: 100000
  default_start: "20210101"
  default_end: "20231231"
  commission: 0.0003  # 0.03% commission

strategies:
  sma:
    short_window: 10
    long_window: 30
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9
  kdj:
    period: 14
    k_period: 3
    d_period: 3
  bollinger:
    period: 20
    std_dev: 2.0
  multi_factor:
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9

position:
  default_type: "percent"
  default_value: 0.1

risk:
  stop_loss_percent: 0.05  # 5% stop loss
  take_profit_percent: 0.10  # 10% take profit
  max_drawdown_percent: 0.20  # 20% max drawdown

visualization:
  output_dir: "./results"
  enable_charts: true