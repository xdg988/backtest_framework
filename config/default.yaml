data:
  token: "xx"  # Replace with your actual token
  cache_dir: "./data_cache"
  cache_expiry_days: 7

backtest:
  default_strategy: "ETFLinearMomentumRotation"
  default_ts_code: "000001.SZ"
  default_cash: 100000
  default_start: "20210101"
  default_end: "20251231"
  commission: 0.0005  # 0.03% commission
