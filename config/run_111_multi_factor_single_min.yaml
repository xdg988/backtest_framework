data:
  token: "xx"
  etf_to_index_map:
    "510300.XSHG": "000300.SH"
    "159915.XSHE": "399006.SZ"
    "512100.XSHG": "000905.SH"
    "513100.XSHG": "SPX"
    "159920.XSHE": "399975.SZ"

backtest:
  default_strategy: "ETFMultiFactorSingleRotation"
  default_cash: 100000
  default_start: "20200101"
  default_end: "20251020"
  benchmark_code: "000300.SH"

strategies:
  etf_multi_factor_single_rotation:
    commission: 0.0005
    slippage_perc: 0.001
    target_percent: 0.98
    cost_buffer: 0.003
    etf_pool:
      - "510300.XSHG"
      - "159915.XSHE"
      - "512100.XSHG"
      - "513100.XSHG"
      - "159920.XSHE"
    top_n: 3
    rebalance: "monthly"
    min_score: null
    weight_method: "equal"
    momentum_windows: [60]
    volatility_windows: [60]
    momentum_regression_windows: [25]
    turnover_window: 20
    factor_weights: null
    factor_directions:
      momentum_60: 1
      volatility_60: -1
      turnover_rate_20: 1
      momentum_regression_25: 1
    factor_whitelist:
      - "momentum_60"
      - "volatility_60"
      - "turnover_rate_20"
      - "momentum_regression_25"
    financial_factors:
      enabled: false
      coverage_threshold: 0.6
      date_priority: ["ann_date", "f_ann_date", "end_date"]
      use_income_only: false
      fields:
        roe_qoq_growth: true
        dtprofit_qoq_growth_rate: true
        cur_asset_ratio_qoq_growth: true
    fill_value: 0.0
    drop_missing_factors: false

visualization:
  output_dir: "./results"
  enable_charts: true
